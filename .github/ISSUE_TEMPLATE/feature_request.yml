name: 功能建议 / Feature Request
description: 提交改进想法或新功能建议 / Suggest an improvement or a new feature
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请说明你想解决的问题，以及你期望的改进方式。
        Please explain the problem you want to solve and the improvement you would like to see.

  - type: input
    id: summary
    attributes:
      label: 建议摘要 / Summary
      description: 用一句话概括你的建议 / Summarize your suggestion in one sentence
      placeholder: |
        例如：支持批量导出多个项目
        Example: Support exporting multiple projects in batch
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题 / Problem Statement
      description: 描述当前的痛点、限制或使用障碍 / Describe the current pain point, limitation, or workflow problem
      placeholder: |
        请说明当前遇到的问题。
        Please describe the current problem.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 希望的方案 / Proposed Solution
      description: 说明你希望产品如何改进 / Describe how you would like the product to improve
      placeholder: |
        请描述你期望的功能或改进方案。
        Please describe the feature or improvement you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 可替代方案 / Alternatives Considered
      description: 你是否考虑过其他实现方式或替代方案 / Have you considered any alternative approaches or workarounds
      placeholder: 可选填写 / Optional
    validations:
      required: false

  - type: textarea
    id: use_case
    attributes:
      label: 使用场景 / Use Case
      description: 说明该功能会在什么场景下使用、带来什么价值 / Explain when this would be used and why it is valuable
      placeholder: |
        例如：管理多个项目时，需要一次性导出全部结果。
        Example: When managing multiple projects, I need to export all results at once.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 附加信息 / Additional Context
      description: 可补充草图、参考产品、截图或其他说明 / Add mockups, references, screenshots, or other supporting details
      placeholder: 请补充任何有助于理解需求的信息 / Add anything else that helps explain the request
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私提醒确认 / Privacy Confirmation
      description: 提交前请确认未包含敏感或隐私数据 / Confirm that no sensitive or private data is included
      options:
        - label: 我已确认不会上传隐私、敏感信息或未脱敏数据。因我个人原因造成的隐私泄露，作者无需负责。 / I confirm that I am not uploading private, sensitive, or unredacted data. The author is not responsible for any privacy breaches caused by personal reasons.
          required: true
